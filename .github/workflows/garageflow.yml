name: GarageFlow CI/CD

on:
  workflow_dispatch:

concurrency:
  group: garageflow-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/garageflow-quality.yml

  e2e:
    name: E2E
    needs: quality
    uses: ./.github/workflows/garageflow-e2e.yml

  build:
    name: Build
    needs: e2e
    uses: ./.github/workflows/garageflow-build.yml

  deploy-kind:
    name: Deploy Kind
    needs: build
    uses: ./.github/workflows/garageflow-deploy-kind.yml

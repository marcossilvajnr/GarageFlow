services:
  postgres:
    image: postgres:16-alpine
    container_name: garageflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garageflow}
      POSTGRES_USER: ${POSTGRES_USER:-garageflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garageflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - garageflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garageflow} -d ${POSTGRES_DB:-garageflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    container_name: garageflow-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__GarageFlow: Host=postgres;Port=5432;Database=${POSTGRES_DB:-garageflow};Username=${POSTGRES_USER:-garageflow};Password=${POSTGRES_PASSWORD:-garageflow}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"

  sonar-db:
    image: postgres:16-alpine
    container_name: garageflow-sonarqube-postgres
    profiles: ["quality"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - garageflow-sonar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d ${SONAR_DB_NAME:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  sonarqube:
    image: sonarqube:lts-community
    container_name: garageflow-sonarqube
    profiles: ["quality"]
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    ports:
      - "${SONARQUBE_PORT:-9000}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  garageflow-postgres-data:
  garageflow-sonar-postgres-data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

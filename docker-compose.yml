services:
  postgres:
    image: postgres:16-alpine
    container_name: garageflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garageflow}
      POSTGRES_USER: ${POSTGRES_USER:-garageflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garageflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - garageflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garageflow} -d ${POSTGRES_DB:-garageflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    container_name: garageflow-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__GarageFlow: Host=postgres;Port=5432;Database=${POSTGRES_DB:-garageflow};Username=${POSTGRES_USER:-garageflow};Password=${POSTGRES_PASSWORD:-garageflow}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"

volumes:
  garageflow-postgres-data:

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garageflow-postgres-data
  namespace: garageflow
  labels:
    app.kubernetes.io/name: garageflow-postgres
    app.kubernetes.io/part-of: garageflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garageflow-postgres
  namespace: garageflow
  labels:
    app.kubernetes.io/name: garageflow-postgres
    app.kubernetes.io/part-of: garageflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garageflow-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garageflow-postgres
        app.kubernetes.io/part-of: garageflow
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: garageflow-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: garageflow-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: garageflow-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: garageflow-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: garageflow-postgres
  namespace: garageflow
  labels:
    app.kubernetes.io/name: garageflow-postgres
    app.kubernetes.io/part-of: garageflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: garageflow-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: garageflow-webhost
  namespace: garageflow
  labels:
    app.kubernetes.io/name: garageflow-webhost
    app.kubernetes.io/part-of: garageflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: garageflow-webhost
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
